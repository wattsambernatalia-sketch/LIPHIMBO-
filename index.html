<!DOCTYPE html>
<html>
<head>
  <title>Liphimbo App</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      margin-top: 5px;
    }

    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .status {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<h1>LIPHIMBO COMMUNITY</h1>

<h3>Report a Problem</h3>

<input type="text" id="title" placeholder="Title">
<textarea id="desc" placeholder="Describe the issue"></textarea>

<button onclick="addIssue()">Submit Issue</button>

<h3>Community Feed</h3>
<div id="feed"></div>

<script>
function addIssue() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;

    if (title === "" || desc === "") return;

    let issue = {
        title: title,
        desc: desc,
        status: "OPEN"
    };

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h4>${issue.title}</h4>
        <p>${issue.desc}</p>
        <p class="status">Status: ${issue.status}</p>
        <button onclick="markResolved(this)">Mark as Resolved</button>
    `;

    document.getElementById("feed").prepend(card);

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
}

function markResolved(btn) {
    btn.parentElement.querySelector(".status").innerText = "Status: RESOLVED";
}
</script>

</body>
  </html>
